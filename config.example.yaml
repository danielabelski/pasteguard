# PasteGuard Configuration
mode: mask

server:
  port: 3000
  host: "0.0.0.0"
  request_timeout: 120

providers:
  openai:
    base_url: http://9router:20128/v1
    api_key: "${NINE_ROUTER_API_KEY}"
  anthropic:
    base_url: http://9router:20128
  codex:
    base_url: http://9router:20128/v1

masking:
  show_markers: false
  whitelist:
    - "Claude"
    - "Sonnet"
    - "Opus"
    - "Haiku"
    - "claude-md-bootstrap"
    - "claude-mem"
    - "[["

pii_detection:
  enabled: true
  presidio_url: http://localhost:5002
  languages: ${PASTEGUARD_LANGUAGES:-en,ru}
  fallback_language: en
  score_threshold: 0.7
  scan_roles:
    - user
    - tool
  entities:
    - EMAIL_ADDRESS
    - PHONE_NUMBER
    - IBAN_CODE
    # - IP_ADDRESS  — intentionally disabled for diagnostics

secrets_detection:
  enabled: true
  action: mask
  scan_roles:
    - user
    - tool
  entities:
    - OPENSSH_PRIVATE_KEY
    - PEM_PRIVATE_KEY
    - API_KEY_SK
    - API_KEY_AWS
    - API_KEY_GITHUB
    - JWT_TOKEN
    - BEARER_TOKEN
    - ENV_PASSWORD
    - ENV_SECRET
    - CONNECTION_STRING
    - SLACK_TOKEN
    - HF_TOKEN
    - GITLAB_TOKEN
    - GOOGLE_API_KEY
    - GENERIC_API_KEY
  max_scan_chars: 1200000
  log_detected_types: true

logging:
  database: ./data/pasteguard.db
  retention_days: 30
  log_masked_content: true
  debug: false

dashboard:
  enabled: true

# Per-model context windows surfaced via /v1/models as `context_length`.
# Id-exact map of model id -> context window. Accepts either a YAML object map
# (as below) OR a comma-separated "id=number,id=number" string (handy for env
# substitution, e.g. model_context_windows: "${MODEL_CONTEXT_WINDOWS:-}").
# Only ids present here are enriched; upstream-provided context_length is never
# overwritten. Standard, public context sizes — safe to ship as defaults.
model_context_windows:
  "cx/gpt-5.4": 272000
  "cx/gpt-5.4-review": 272000
  "cx/gpt-5.4-mini": 400000
  "cx/gpt-5.4-mini-review": 400000
  "cx/gpt-5.5": 1050000
  "cx/gpt-5.5-review": 1050000
  "minimax/MiniMax-M3": 1000000
  "ide2llm/MiniMax M3": 1000000
